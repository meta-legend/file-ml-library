name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v4

      # File ML has zero external dependencies (pure <filesystem> + <fstream>),
      # so there is nothing to install on any platform.

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DFILEML_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest -C Release --output-on-failure

      - name: Install (verify export)
        run: cmake --install build --config Release --prefix "${{ runner.temp }}/fileml-install"
